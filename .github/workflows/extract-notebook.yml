name: Extract notebook summary

on:
  push:
    branches: [main]
    paths:
      - "Descriptive_Analysis_Ethics_Dataset.ipynb"
      - ".github/scripts/extract_notebook.py"
      - ".github/workflows/extract-notebook.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract notebook content
        run: python .github/scripts/extract_notebook.py

      - name: Commit extracted content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add NOTEBOOK_EXTRACT.md
          if git diff --cached --quiet; then
            echo "No extraction changes to commit."
          else
            git commit -m "Add temporary notebook extraction [skip ci]"
            git push
          fi
